<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>かんじ3マッチパズル</title>
  <style>
  body{font-family:sans-serif;text-align:center;background:#f0f8ff;margin:0;padding:20px;}
  button{font-size:22px;padding:12px 24px;margin:5px;border-radius:12px;cursor:pointer;background:linear-gradient(to right,#ff8a80,#ffd180);color:#fff;border:none;}
  #settings{display:block;}
  #game{display:none;}
  
  
  
  .tile{width:50px;height:50px;display:flex;align-items:center;justify-content:center;position:absolute;cursor:pointer;font-size:28px;transition:transform 0.2s ease,opacity 0.3s ease;border-radius:10px;color:#333;background:#dcdcdc;}
  .tile:hover{transform:scale(1.2) rotate(5deg);}
  #stock{position:relative;width:400px;height:60px;margin:20px 
   auto;border-radius:10px;background:linear-gradient(to right,#ffe0b2,#fff3e0);}
  .stock-slot{width:50px;height:50px;position:absolute;top:5px;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:8px;background:#fff;border:2px solid #ff8a80;}
  
  /* ラジオ/チェックを見やすく・スリム化 */
  input[type="radio"], input[type="checkbox"]{display:none;}
  label{
    padding:4px 8px;
    border-radius:6px;
    border:2px solid #ff8a80;
    margin:0 3px;
    cursor:pointer;
    display:inline-block;
    transition:0.2s;
    font-size:18px;
  }
  input[type="radio"]:checked + label,
  input[type="checkbox"]:checked + label{
    background:linear-gradient(to right,#ff8a80,#ffd180);
    color:#fff;
  }
  
  /* メッセージをボード中央に表示（修正版） */
  #board{
    position:relative;
    margin:20px auto;
    border-radius:15px;
    background:linear-gradient(to bottom,#fff9c4,#ffe0b2);
    overflow:hidden; /* ← エフェクトやメッセージを範囲内に */
  }
  
  #message{
    font-size:28px;
    font-weight:bold;
    color:#e91e63;
    position:absolute; /* #board 内で中央固定 */
    z-index:1000;      /* ← 他のタイルやエフェクトより前面に */
    pointer-events:none;
    text-shadow:1px 1px 2px #fff;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:none;       /* ← 最初は非表示に */
  }
  
      #restartBtn,
  #backBtn{
    display:none;
  }
  
      .tile{
    user-select:none;
    -webkit-user-select:none;
    touch-action:manipulation;
  }
  </style>
</head>

<body>
  <h1>かんじ3マッチパズル</h1>
  <div id="settings">
    <h2>ゲーム設定</h2>
    <div>
      <strong>難易度：</strong>
      <input type="radio" name="difficulty" value="easy" id="easy" checked>
      <label for="easy">レベル1</label>
      <input type="radio" name="difficulty" value="medium" id="medium">
      <label for="medium">レベル2</label>
      <input type="radio" name="difficulty" value="hard" id="hard">
      <label for="hard">レベル3</label>
    </div>
    <div style="margin-top:12px">
      <input type="checkbox" class="gradeChk" value="1年" id="g1" checked>
      <label for="g1">1年</label>
      <input type="checkbox" class="gradeChk" value="2年" id="g2" checked>
      <label for="g2">2年</label>
      <input type="checkbox" class="gradeChk" value="3年" id="g3" checked>
      <label for="g3">3年</label>
      <input type="checkbox" class="gradeChk" value="4年" id="g4">
      <label for="g4">4年</label>
      <input type="checkbox" class="gradeChk" value="5年" id="g5">
      <label for="g5">5年</label>
      <input type="checkbox" class="gradeChk" value="6年" id="g6">
      <label for="g6">6年</label>
      <input type="checkbox" class="gradeChk" value="中学" id="g7">
      <label for="g7">中学</label>
    </div>
    <div style="margin-top:12px">
      <input type="radio" name="bushu" class="bushuRadio" value="木" id="b1">
      <label for="b1">木</label>
      <input type="radio" name="bushu" class="bushuRadio" value="道具" id="b2">
      <label for="b2">道具</label>
      <input type="radio" name="bushu" class="bushuRadio" value="金属" id="b3">
      <label for="b3">金属</label>
      <input type="radio" name="bushu" class="bushuRadio" value="魚" id="b4">
      <label for="b4">魚</label>
      <input type="radio" name="bushu" class="bushuRadio" value="心" id="b5">
      <label for="b5">心</label>
      <input type="radio" name="bushu" class="bushuRadio" value="ウ冠" id="b6">
      <label for="b6">ウ冠</label>
      <input type="radio" name="bushu" class="bushuRadio" value="手偏" id="b7">
      <label for="b7">手偏</label>
      <input type="radio" name="bushu" class="bushuRadio" value="水" id="b8">
      <label for="b8">水</label>
      <input type="radio" name="bushu" class="bushuRadio" value="糸偏" id="b9">
      <label for="b9">糸偏</label>
      <input type="radio" name="bushu" class="bushuRadio" value="言偏" id="b10">
      <label for="b10">言偏</label>
      <input type="radio" name="bushu" class="bushuRadio" value="木偏" id="b11">
      <label for="b11">木偏</label>
      <input type="radio" name="bushu" class="bushuRadio" value="草冠" id="b12">
      <label for="b12">草冠</label>
      <input type="radio" name="bushu" class="bushuRadio" value="人偏" id="b13">
      <label for="b13">人偏</label>
    </div>
    <div style="margin-top:12px">
      <button id="startBtn">スタート</button>
    </div>
  </div>
  <div id="game">
    <div id="board">
      <div id="message">
      </div>
    </div>
    <div id="stock">
    </div>
    <button id="restartBtn">リスタート</button>
    <button id="backBtn">戻る</button>
  </div>
  <script src="kanjiList.js"></script>
  <script src="main.js"></script>
</body>

</html>
